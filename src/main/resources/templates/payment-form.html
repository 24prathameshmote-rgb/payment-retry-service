<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Payment</title>
    <link rel="stylesheet" th:href="@{/style.css}">

</head>
<body>
    <h1>Create Payment</h1>
    

    <form th:action="@{/payments}" th:object="${payment}" method="post">

        <div>
            <label>User ID:</label>
            <input type="text" th:field="*{userId}" required>

        </div>


        <div>
            <label>Amount:</label>
            <input type="number" step="0.01" th:field="*{amount}" required>
        </div>

        <div>
            <label>Country:</label>
            <input type="text" th:field="*{country}" required>
        </div>

        <div>
            <label>Payment Method:</label>
            <select th:field="*{paymentMethod}" required>
                <option value="">Select</option>
                <option value="CARD">CARD</option>
                <option value="BANK_TRANSFER">BANK_TRANSFER</option>
                <option value="DIGITAL_WALLET">DIGITAL_WALLET</option>
            </select>
        </div>


        <button type="submit">Submit Payment</button>
    </form>


    <br>

    <a th:href="@{/payments}" class="btn">View All Payments</a>

</body>
</html>
